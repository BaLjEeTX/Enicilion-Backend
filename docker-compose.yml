
services:
  # 1. Redis Caching Service
  redis:
    image: redis:7-alpine
    container_name: enicilion-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Enicilion Spring Boot Application Service
  app:
    build: .
    container_name: enicilion-app
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_USERNAME=${DATABASE_USERNAME}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_ACCESS_SECRET=dGhpcy1pcy1hLXNlY3JldC1rZXktZm9yLWp3dC1hY2Nlc3MtdG9rZW4tc2VjdXJlLWVuaWNpbGlvbi1uZXc=
      - JWT_REFRESH_SECRET=dGhpcy1pcy1hLXNlY3JldC1rZXktZm9yLWp3dC1yZWZyZXNoLXRva2VuLXNlY3VyZS1lbmljaWxpb24tbmV3=
      - SCANNER_PASSWORD=enicilion2026
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - RAZORPAY_WEBHOOK_SECRET=${RAZORPAY_WEBHOOK_SECRET}
      - RAZORPAY_SANDBOX_BYPASS_ALLOWED=${RAZORPAY_SANDBOX_BYPASS_ALLOWED}
      - ZEPTOMAIL_API_KEY=${ZEPTOMAIL_API_KEY}
      - ZEPTOMAIL_SENDER=${ZEPTOMAIL_SENDER}
      - WA_TOKEN=${WA_TOKEN}
      - WA_PHONE_NUMBER_ID=${WA_PHONE_NUMBER_ID}
      - WA_TEMPLATE_NAME=${WA_TEMPLATE_NAME}
      - ZEPTOMAIL_TOKEN=${ZEPTOMAIL_TOKEN}
      - ZEPTOMAIL_API_URL=${ZEPTOMAIL_API_URL}
      - FROM_EMAIL=${FROM_EMAIL}
      - FROM_NAME=${FROM_NAME}
      - PUBLIC_API_BASE_URL=${PUBLIC_API_BASE_URL}
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
